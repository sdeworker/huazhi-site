<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>页面未发生 · 华智科技</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0A0A16;--text:#EAEAF4;--muted:#9A9ABE;--E:#6D5EF6;--D:#FF5C8A;--S:#2DE1C2;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--ink);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:"Sora",-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;text-align:center;padding:30px}
  .code{font-family:"Space Mono",monospace;font-size:13px;letter-spacing:.2em;color:var(--muted);margin-bottom:22px}
  h1{font-size:clamp(30px,6vw,52px);font-weight:800;letter-spacing:-.02em;line-height:1.15}
  h1 .g{background:linear-gradient(100deg,var(--S),var(--E) 60%,var(--D));-webkit-background-clip:text;background-clip:text;color:transparent}
  p{margin-top:20px;color:var(--muted);font-size:16px}
  a{display:inline-block;margin-top:34px;padding:13px 26px;border-radius:12px;color:#fff;text-decoration:none;
    font-weight:600;background:linear-gradient(100deg,var(--E),var(--D));box-shadow:0 8px 30px rgba(109,94,246,.25)}
</style>
</head>
<body>
  <div>
    <div class="code">ERROR 404 · 无成熟 S</div>
    <h1>这个页面<span class="g">尚未发生</span></h1>
    <p>结构还没显露到可识别的程度。回到首页，从底盘重新出发。</p>
    <a href="/">返回首页</a>
  </div>
</body>
</html>
